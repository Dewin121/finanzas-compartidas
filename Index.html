
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas en Vivo - Diagnóstico</title>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            alert("❌ ERROR DETECTADO:\n" + message + "\nLínea: " + lineno + "\nEn: " + source);
            return false;
        };
        window.addEventListener('unhandledrejection', function (event) {
            alert("❌ PROMESA RECHAZADA:\n" + event.reason);
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-5 px-4 shadow-md rounded-b-2xl">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Control Financiero ☁️</h1>
                <p class="text-xs text-blue-100 mt-0.5">Sincronización en Vivo</p>
            </div>
            <div id="indicador-nube" class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white text-xs font-bold">
                ✓
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">

        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-4">
                📊 Balance del Mes
            </h2>
            
            <div class="grid grid-cols-2 gap-4 mb-5">
                <div class="bg-blue-50 p-3.5 rounded-xl border border-blue-100/50">
                    <span class="text-xs text-blue-600 font-medium block mb-1">Obligación Dewin</span>
                    <span id="total-dewin" class="text-lg font-bold text-blue-950">$0</span>
                </div>
                <div class="bg-pink-50 p-3.5 rounded-xl border border-pink-100/50">
                    <span class="text-xs text-pink-600 font-medium block mb-1">Obligación Lili</span>
                    <span id="total-lili" class="text-lg font-bold text-pink-950">$0</span>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-xs font-medium mb-1.5">
                        <span class="text-slate-600">Progreso Total de Pagos</span>
                        <span id="pago-porcentaje" class="text-blue-600 font-bold">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                        <div id="pago-barra" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between text-xs font-medium mb-1.5">
                        <span class="text-slate-600">Meta de Ahorro Mutuo</span>
                        <span id="ahorro-porcentaje" class="text-emerald-600 font-bold">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                        <div id="ahorro-barra" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">
                    📋 Distribución Transparente
                </h2>
                <button onclick="forzarReseteoBaseDatos()" class="text-[11px] bg-red-50 hover:bg-red-100 px-2 py-1 rounded-md font-medium text-red-600 transition-colors">
                    ⚠️ Forzar Carga Inicial
                </button>
            </div>

            <div class="divide-y divide-slate-100 min-h-[150px] bg-white" id="lista-gastos">
                </div>
        </section>

        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-4">
                🐷 Fondos de Ahorro Ajustados
            </h2>

            <div class="space-y-4">
                <div class="p-3 bg-slate-50 rounded-xl border border-slate-200/60">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Dewin (Mensual fijo)
                        </span>
                        <span class="text-xs text-slate-500 font-medium" id="txt-ahorro-dewin">$0 / $400.000</span>
                    </div>
                    <input type="range" id="range-dewin" min="0" max="400000" step="50000" value="0" class="w-full accent-blue-600 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer" onchange="subirDatosNube()">
                </div>

                <div class="p-3 bg-slate-50 rounded-xl border border-slate-200/60">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-pink-500"></span> Lili (Semanal - $90k c/u)
                        </span>
                        <span class="text-xs text-slate-500 font-medium" id="txt-ahorro-lili">$0 / $360.000</span>
                    </div>
                    <div class="grid grid-cols-4 gap-2 mt-2">
                        <label id="lbl-sem1" class="flex flex-col items-center p-2 bg-white rounded-lg border border-slate-200 cursor-pointer select-none">
                            <span class="text-[10px] text-slate-400 font-medium">Sem 1</span>
                            <span class="text-[11px] font-bold text-slate-700 mt-0.5">$90k</span>
                            <input type="checkbox" id="sem1" class="hidden" value="90000" onchange="subirDatosNube()">
                        </label>
                        <label id="lbl-sem2" class="flex flex-col items-center p-2 bg-white rounded-lg border border-slate-200 cursor-pointer select-none">
                            <span class="text-[10px] text-slate-400 font-medium">Sem 2</span>
                            <span class="text-[11px] font-bold text-slate-700 mt-0.5">$90k</span>
                            <input type="checkbox" id="sem2" class="hidden" value="90000" onchange="subirDatosNube()">
                        </label>
                        <label id="lbl-sem3" class="flex flex-col items-center p-2 bg-white rounded-lg border border-slate-200 cursor-pointer select-none">
                            <span class="text-[10px] text-slate-400 font-medium">Sem 3</span>
                            <span class="text-[11px] font-bold text-slate-700 mt-0.5">$90k</span>
                            <input type="checkbox" id="sem3" class="hidden" value="90000" onchange="subirDatosNube()">
                        </label>
                        <label id="lbl-sem4" class="flex flex-col items-center p-2 bg-white rounded-lg border border-slate-200 cursor-pointer select-none">
                            <span class="text-[10px] text-slate-400 font-medium">Sem 4</span>
                            <span class="text-[11px] font-bold text-slate-700 mt-0.5">$90k</span>
                            <input type="checkbox" id="sem4" class="hidden" value="90000" onchange="subirDatosNube()">
                        </label>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const FIREBASE_URL = "https://finanza-88b8e-default-rtdb.firebaseio.com/finanzas.json";

        const gastosPorDefecto = {
            "1": { id: 1, nombre: 'Mercado Semanal', monto: 125000, responsable: 'Lili', cuotas: 'N/A', fecha: 'Semanal', pagado: false },
            "2": { id: 2, nombre: 'Apoyo Madre', monto: 25000, responsable: 'Lili', cuotas: 'N/A', fecha: 'Semanal', pagado: false },
            "3": { id: 3, nombre: 'Merienda Valentina', monto: 5000, responsable: 'Lili', cuotas: 'N/A', fecha: 'Semanal', pagado: false },
            "4": { id: 4, nombre: 'Internet', monto: 60000, responsable: 'Lili', cuotas: 'N/A', fecha: 'Mes', pagado: false },
            "5": { id: 5, nombre: 'Transporte Lili', monto: 240000, responsable: 'Lili', cuotas: 'N/A', fecha: 'Mes', pagado: false },
            "6": { id: 6, nombre: 'Arriendo', monto: 370000, responsable: 'Dewin', cuotas: 'N/A', fecha: 'Mes', pagado: false },
            "7": { id: 7, nombre: 'Luz', monto: 220000, responsable: 'Dewin', cuotas: 'N/A', fecha: 'Mes', pagado: false },
            "8": { id: 8, nombre: 'Addi', monto: 216000, responsable: 'Dewin', cuotas: '3', fecha: '10', pagado: false },
            "9": { id: 9, nombre: 'Tarjeta', monto: 256000, responsable: 'Dewin', cuotas: 'N/A', fecha: '17', pagado: false },
            "10": { id: 10, nombre: 'Bancolombia', monto: 253000, responsable: 'Dewin', cuotas: '12', fecha: '01', pagado: false },
            "11": { id: 11, nombre: 'Transporte Dewin', monto: 288000, responsable: 'Dewin', cuotas: 'N/A', fecha: 'Mes', pagado: false }
        };

        let memoriaGastos = Object.assign({}, gastosPorDefecto);
        const metaAhorroTotal = 760000;

        function inicializarApp() {
            renderizarInterfazLocal();
            descargarDatosNube();
            setInterval(descargarDatosNube, 5000);
        }

        async function descargarDatosNube() {
            try {
                const res = await fetch(FIREBASE_URL);
                if (!res.ok) throw new Error("Error en Fetch HTTP: " + res.status);
                const data = await res.json();
                
                if (data && data.gastos) {
                    memoriaGastos = data.gastos;
                    renderizarInterfazLocal(data);
                    marcarIconoNube('sincronizado');
                } else {
                    await subirDatosNube();
                }
            } catch (error) {
                marcarIconoNube('error');
                console.error(error);
            }
        }

        function renderizarInterfazLocal(dataNube = null) {
            const contenedor = document.getElementById('lista-gastos');
            if (!contenedor) return;
            
            let html = '';
            let totalDewin = 0;
            let totalLili = 0;
            let totalPagado = 0;
            let totalCostoMes = 0;

            Object.keys(memoriaGastos).forEach(key => {
                const gasto = memoriaGastos[key];
                if (!gasto) return;
                
                const isDewin = gasto.responsable === 'Dewin';
                const tagColor = isDewin ? 'bg-blue-50 text-blue-600 border-blue-100' : 'bg-pink-50 text-pink-600 border-pink-100';
                const textStyle = gasto.pagado ? 'line-through text-slate-300' : 'text-slate-800';
                
                totalCostoMes += parseInt(gasto.monto || 0);
                if(isDewin) totalDewin += parseInt(gasto.monto || 0); else totalLili += parseInt(gasto.monto || 0);
                if(gasto.pagado) totalPagado += parseInt(gasto.monto || 0);

                html += `
                    <div class="p-4 flex items-center justify-between border-b border-slate-100">
                        <div class="flex items-center gap-3 flex-1 min-w-0">
                            <input type="checkbox" ${gasto.pagado ? 'checked' : ''} class="w-5 h-5 accent-slate-700 cursor-pointer rounded" onchange="cambiarEstadoPago('${gasto.id}', this.checked)">
                            <div class="min-w-0 flex-1">
                                <p class="text-sm font-semibold truncate ${textStyle}">${gasto.nombre}</p>
                                <p class="text-[10px] text-slate-400 truncate mt-0.5">
                                    F. Pago: <span class="font-medium text-slate-600">${gasto.fecha}</span> | Cuotas: <span class="font-medium text-slate-600">${gasto.cuotas}</span>
                                </p>
                            </div>
                        </div>
                        <div class="text-right ml-2">
                            <p class="text-sm font-bold text-slate-900">$${parseInt(gasto.monto || 0).toLocaleString('es-CO')}</p>
                            <span class="inline-block text-[9px] uppercase font-bold px-1.5 py-0.5 rounded border ${tagColor}">
                                ${gasto.responsable}
                            </span>
                        </div>
                    </div>
                `;
            });

            contenedor.innerHTML = html;
            document.getElementById('total-dewin').innerText = `$${totalDewin.toLocaleString('es-CO')}`;
            document.getElementById('total-lili').innerText = `$${totalLili.toLocaleString('es-CO')}`;

            const dewinAhorroVal = dataNube ? (dataNube.ahorroDewin || 0) : parseInt(document.getElementById('range-dewin').value || 0);
            document.getElementById('range-dewin').value = dewinAhorroVal;
            document.getElementById('txt-ahorro-dewin').innerText = `$${dewinAhorroVal.toLocaleString('es-CO')} / $400.000`;

            let ahorroLili = 0;
            ['sem1', 'sem2', 'sem3', 'sem4'].forEach(semId => {
                const chk = document.getElementById(semId);
                if (!chk) return;
                if (dataNube && dataNube.ahorrosLili) {
                    chk.checked = dataNube.ahorrosLili[semId] || false;
                }
                
                const lbl = document.getElementById(`lbl-${semId}`);
                if(chk.checked) {
                    ahorroLili += 90000;
                    if(lbl) lbl.className = "flex flex-col items-center p-2 rounded-lg border border-pink-300 bg-pink-50 text-pink-600 transition-all cursor-pointer select-none";
                } else {
                    if(lbl) lbl.className = "flex flex-col items-center p-2 bg-white rounded-lg border border-slate-200 text-slate-700 transition-all cursor-pointer select-none";
                }
            });
            document.getElementById('txt-ahorro-lili').innerText = `$${ahorroLili.toLocaleString('es-CO')} / $360.000`;

            const porcPagos = Math.round((totalPagado / totalCostoMes) * 100) || 0;
            document.getElementById('pago-porcentaje').innerText = `${porcPagos}%`;
            document.getElementById('pago-barra').style.width = `${porcPagos}%`;

            const porcAhorro = Math.round(((dewinAhorroVal + ahorroLili) / metaAhorroTotal) * 100) || 0;
            document.getElementById('ahorro-porcentaje').innerText = `${porcAhorro}%`;
            document.getElementById('ahorro-barra').style.width = `${porcAhorro}%`;
        }

        async function subirDatosNube() {
            marcarIconoNube('cargando');
            const payload = {
                gastos: memoriaGastos,
                ahorroDewin: parseInt(document.getElementById('range-dewin').value || 0),
                ahorrosLili: {
                    sem1: document.getElementById('sem1').checked,
                    sem2: document.getElementById('sem2').checked,
                    sem3: document.getElementById('sem3').checked,
                    sem4: document.getElementById('sem4').checked
                }
            };
            
            try {
                const r = await fetch(FIREBASE_URL, { 
                    method: 'PUT', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });
                if(!r.ok) throw new Error("Fallo en PUT HTTP: " + r.status);
                marcarIconoNube('sincronizado');
            } catch (e) { 
                marcarIconoNube('error'); 
            }
        }

        function forzarReseteoBaseDatos() {
            if(confirm("¿Restablecer base de datos?")) {
                memoriaGastos = Object.assign({}, gastosPorDefecto);
                renderInitializeForced();
            }
        }

        function cambiarEstadoPago(id, estado) {
            if(memoriaGastos[id]) {
                memoriaGastos[id].pagado = estado;
                renderInitializeForced();
            }
        }

        function renderInitializeForced() {
            renderizarInterfazLocal();
            subirDatosNube();
        }

        function marcarIconoNube(estado) {
            const ind = document.getElementById('indicador-nube');
            if(!ind) return;
            if(estado === 'sincronizado') {
                ind.className = "w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white text-xs font-bold";
                ind.innerText = "✓";
            } else if (estado === 'cargando') {
                ind.className = "w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-bold animate-pulse";
                ind.innerText = "...";
            } else {
                ind.className = "w-8 h-8 rounded-full bg-amber-500 flex items-center justify-center text-white text-xs font-bold";
                ind.innerText = "⚠";
            }
        }

        inicializarApp();
    </script>
</body>
</html>
